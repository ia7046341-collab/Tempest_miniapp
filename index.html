<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tempest Network</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Orbitron:wght@400;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #0d0d0d;
            --cyan-glow: #00ffff;
            --text-main: #ffffff;
            --text-dim: #999999;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0; background-color: var(--bg-color);
            color: var(--text-main); display: flex;
            flex-direction: column; align-items: center;
            overflow-x: hidden; padding-bottom: 80px;
            position: relative;
        }

        /* एनीमेटेड बैकग्राउंड */
        body::before {
            content: ""; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: radial-gradient(white, rgba(255,255,255,0) 2px), radial-gradient(var(--cyan-glow), rgba(0,255,255,0) 1px);
            background-size: 100px 100px, 60px 60px; opacity: 0.12;
            animation: move-aura 25s linear infinite; z-index: -1;
        }
        @keyframes move-aura { from { background-position: 0 0; } to { background-position: 500px 1000px; } }

        .main-title { 
            font-family: 'Bangers', cursive; font-size: 32px; 
            color: var(--cyan-glow); letter-spacing: 3px; 
            text-shadow: 0 0 15px var(--cyan-glow); margin-top: 20px;
        }

        h3, h2 { font-family: 'Orbitron', sans-serif; letter-spacing: 1px; text-transform: uppercase; }

        /* --- NEW BOTTOM BACK BUTTON --- */
        .bottom-nav {
            position: fixed; bottom: 25px; width: 100%;
            display: flex; justify-content: center; z-index: 4000;
            pointer-events: none;
        }

        .back-btn-float {
            pointer-events: auto; font-family: 'Orbitron', sans-serif;
            background: rgba(0, 0, 0, 0.85); color: var(--cyan-glow);
            border: 2px solid var(--cyan-glow); padding: 12px 35px;
            border-radius: 30px; font-weight: 900; font-size: 13px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            cursor: pointer; text-transform: uppercase;
            backdrop-filter: blur(10px); display: none; /* Hidden initially */
        }

        .profile-section { margin-top: 30px; text-align: center; }
        .img-circle {
            width: 120px; height: 120px; border-radius: 50%;
            border: 3px solid var(--cyan-glow); box-shadow: 0 0 25px var(--cyan-glow);
            object-fit: cover;
        }

        .menu-container { width: 92%; margin-top: 30px; display: flex; flex-direction: column; gap: 15px; }
        .nav-card {
            background: var(--card-bg); border-radius: 18px; padding: 22px;
            border: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center;
        }

        #details, #sub-details {
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: #000;
            z-index: 2500; overflow-y: auto; padding-top: 20px;
        }

        .item-card {
            background: var(--glass); border-radius: 15px; padding: 18px;
            margin: 12px 18px; display: flex; align-items: center; gap: 15px;
            border: 1px solid #222;
        }
        
        .list-icon { 
            width: 60px; height: 60px; border-radius: 50%; 
            object-fit: cover; border: 2px solid var(--cyan-glow); 
            box-shadow: 0 0 10px rgba(0,255,255,0.5);
        }
        
        .card-info { flex: 1; }
        .card-info h4 { font-family: 'Orbitron', sans-serif; margin: 0; font-size: 15px; color: #fff; text-transform: uppercase; }
        .card-info p { margin: 4px 0 10px; font-size: 11px; color: var(--text-dim); }

        .btn-cyan {
            font-family: 'Orbitron', sans-serif; background: var(--cyan-glow);
            color: #000; border: none; padding: 8px 16px;
            border-radius: 8px; font-weight: bold; font-size: 10px;
            box-shadow: 0 0 10px rgba(0,255,255,0.3); text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="profile-section">
        <img src="network.jpg" class="img-circle">
        <div class="main-title">TEMPEST NETWORK</div>
    </div>

    <div class="menu-container">
        <div class="nav-card">
            <div><h3>📡 CHANNELS</h3><p style="color:var(--text-dim); font-size:12px;">Update Hubs</p></div>
            <button class="btn-cyan" onclick="openSec('CHANNELS')">SHOW</button>
        </div>
        <div class="nav-card">
            <div><h3>🤖 MY BOTS</h3><p style="color:var(--text-dim); font-size:12px;">Tools & Automation</p></div>
            <button class="btn-cyan" onclick="openSec('BOTS')">SHOW</button>
        </div>
        <div class="nav-card">
            <div><h3>👥 OUR TEAM</h3><p style="color:var(--text-dim); font-size:12px;">The Creators</p></div>
            <button class="btn-cyan" onclick="openSec('TEAM')">SHOW</button>
        </div>
    </div>

    <div class="bottom-nav">
        <button id="globalBackBtn" class="back-btn-float" onclick="smartBack()">← BACK TO MENU</button>
    </div>

    <div id="details">
        <h2 id="det-title" style="margin-left:22px;"></h2>
        <div id="det-body"></div>
    </div>

    <div id="sub-details">
        <h2 id="sub-det-title" style="margin-left:22px;"></h2>
        <div id="sub-det-body"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const pics = {
            kakashi: "kakashi.jpg",
            akira: "akira.jpg",
            naruto: "naruto.jpg",
            raphael: "raphael.jpg",
            ongoing: "ongoing.jpg",
            tempest_index: "index.jpg",
            tempest_main: "main.jpg", 
            tg_icon: "tg.jpg",
            ig_icon: "ig.jpg",
            goku: "goku.jpg",   // मेक श्योर ये फाइल्स GitHub पर हों
            smokey: "smokey.jpg" 
        };

        const backBtn = document.getElementById('globalBackBtn');

        function openSec(type) {
            const d = document.getElementById('details');
            const body = document.getElementById('det-body');
            document.getElementById('det-title').innerText = type;
            backBtn.style.display = 'block';

            if(type === 'CHANNELS') {
                body.innerHTML = `
                    <div class="item-card"><img src="${pics.ongoing}" class="list-icon"><div class="card-info"><h4>Ongoing Anime</h4><p>Latest Hindi Episodes</p><a href="https://t.me/+mr5SZGOlW0U4YmQ1" class="btn-cyan">JOIN</a></div></div>
                    <div class="item-card"><img src="${pics.tempest_index}" class="list-icon"><div class="card-info"><h4>Tempest Index</h4><p>Complete Database</p><a href="https://t.me/+WevEPT5r7K1lNjY1" class="btn-cyan">JOIN</a></div></div>
                    <div class="item-card"><img src="${pics.tempest_main}" class="list-icon"><div class="card-info"><h4>Tempest main</h4><p>Network & Community</p><a href="https://t.me/tempest_main" class="btn-cyan">JOIN</a></div></div>
                `;
            } else if(type === 'TEAM') {
                body.innerHTML = `
                    <div class="item-card"><img src="${pics.kakashi}" class="list-icon"><div class="card-info"><h4>KAKASHI</h4><p>Founder</p><button class="btn-cyan" onclick="openKakashiSocials()">SOCIALS</button></div></div>
                    <div class="item-card"><img src="${pics.akira}" class="list-icon"><div class="card-info"><h4>AKIRA</h4><p>Lead Developer</p><a href="https://t.me/MightyEmperor" class="btn-cyan">CHAT</a></div></div>
                    <div class="item-card"><img src="${pics.goku}" class="list-icon"><div class="card-info"><h4>GOKU</h4><p>Co-Founder</p><a href="https://t.me/goku_shinobi" class="btn-cyan">CHAT</a></div></div>
                    <div class="item-card"><img src="${pics.naruto}" class="list-icon"><div class="card-info"><h4>NARUTO</h4><p>Network Owner</p><a href="https://t.me/qtflake" class="btn-cyan">CHAT</a></div></div>
                    <div class="item-card"><img src="${pics.smokey}" class="list-icon"><div class="card-info"><h4>SMOKEY</h4><p>Manager</p><a href="https://t.me/con_dom" class="btn-cyan">CHAT</a></div></div>
                `;
            } else if(type === 'BOTS') {
                body.innerHTML = `
                    <div class="item-card"><img src="${pics.raphael}" class="list-icon"><div class="card-info"><h4>Raphael Bot</h4><p>AI Manager</p><a href="https://t.me/tempest_animeresercher_bot" class="btn-cyan">OPEN</a></div></div>
                `;
            }
            d.style.display = 'block';
        }

        function openKakashiSocials() {
            const sub = document.getElementById('sub-details');
            document.getElementById('sub-det-title').innerText = "SOCIALS";
            document.getElementById('sub-det-body').innerHTML = `
                <div class="item-card" onclick="openIdList()"><img src="${pics.tg_icon}" class="list-icon"><div class="card-info"><h4>TELEGRAM</h4><p>Official IDs List</p></div></div>
               
        }
                <div class="item-card" onclick="window.open('https://instagram.com/half_10053', '_blank')"><img src="${pics.ig_icon}" class="list-icon"><div class="card-info"><h4>INSTAGRAM</h4><p>Follow Me</p></div></div>
            `;
            sub.style.display = 'block';
        }

        function openIdList() {
            document.getElementById('sub-det-title').innerText = "IDS";
            document.getElementById('sub-det-body').innerHTML = `
                <div class="item-card"><div class="card-info"><h4>Main ID</h4><p>@Thesoul_xD</p><a href="https://t.me/Thesoul_xD" class="btn-cyan">MESSAGE</a></div></div>
            `;
        }

        // SMART BACK FUNCTION
        function smartBack() {
            const sub = document.getElementById('sub-details');
            const det = document.getElementById('details');
            if (sub.style.display === 'block') {
                if (document.getElementById('sub-det-title').innerText === "IDS") {
                    openKakashiSocials();
                } else {
                    sub.style.display = 'none';
                }
            } else {
                det.style.display = 'none';
                backBtn.style.display = 'none';
            }
        }
    </script>
</body>
</html>
