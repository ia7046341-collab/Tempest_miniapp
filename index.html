<!<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tempest Network</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #0d0d0d;
            --cyan-glow: #00ffff;
            --text-main: #ffffff;
            --text-dim: #999999;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Profile Section */
        .profile-section {
            margin-top: 50px;
            text-align: center;
        }

        .profile-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid var(--cyan-glow);
            box-shadow: 0 0 25px var(--cyan-glow);
            object-fit: cover;
            margin-bottom: 15px;
        }

        .user-name {
            font-size: 28px;
            font-weight: bold;
            color: var(--cyan-glow);
            text-shadow: 0 0 10px var(--cyan-glow);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .user-tag {
            font-size: 12px;
            color: var(--text-dim);
            letter-spacing: 3px;
            margin-top: 8px;
            font-weight: 300;
        }

        /* Menu Container */
        .menu-container {
            width: 92%;
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* Card Style */
        .nav-card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 22px;
            border: 1px solid #1a1a1a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .card-info h3 {
            margin: 0;
            font-size: 19px;
            color: var(--text-main);
            letter-spacing: 1px;
        }

        .card-info p {
            margin: 6px 0 0;
            font-size: 13px;
            color: var(--text-dim);
        }

        /* Cyan Button */
        .action-btn {
            background-color: var(--cyan-glow);
            color: #000000;
            border: none;
            padding: 10px 22px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 13px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Details Overlay */
        #details {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--bg-color);
            z-index: 1000;
            padding: 30px 25px;
            box-sizing: border-box;
        }

        .back-link {
            color: var(--cyan-glow);
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: block;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

    <div class="profile-section">
        <img src="https://graph.org/file/9c42657eb544eed3f1bb1-79928d280532a17768.jpg" alt="Profile" class="profile-circle">
        <div class="user-name">TEMPEST NETWORK</div>
        <div class="user-tag">DEVELOPER • ANIME HUB</div>
    </div>

    <div class="menu-container">
        <div class="nav-card">
            <div class="card-info">
                <h3>📡 CHANNELS</h3>
                <p>Ongoing & Main Updates</p>
            </div>
            <button class="action-btn" onclick="openSec('CHANNELS')">SHOW</button>
        </div>

        <div class="nav-card">
            <div class="card-info">
                <h3>🤖 MY BOTS</h3>
                <p>Automation & Tools</p>
            </div>
            <button class="action-btn" onclick="openSec('BOTS')">SHOW</button>
        </div>

        <div class="nav-card">
            <div class="card-info">
                <h3>👥 TEAM</h3>
                <p>Meet the Creators</p>
            </div>
            <button class="action-btn" onclick="openSec('TEAM')">SHOW</button>
        </div>
    </div>

    <div id="details">
        <span class="back-link" onclick="closeSec()">← BACK TO HOME</span>
        <h2 id="det-title" style="color: var(--cyan-glow); font-size: 28px; text-shadow: 0 0 10px var(--cyan-glow);"></h2>
        <div id="det-body" style="color: #ffffff; line-height: 2; font-size: 16px; margin-top: 20px;"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function openSec(type) {
            const d = document.getElementById('details');
            const title = document.getElementById('det-title');
            const body = document.getElementById('det-body');
            
            title.innerText = type;

            if(type === 'CHANNELS') {
                body.innerHTML = "• <a href='#' style='color:var(--cyan-glow)'>Anime Ongoing</a><br>• <a href='#' style='color:var(--cyan-glow)'>Anime Tempest</a><br>• <a href='#' style='color:var(--cyan-glow)'>Main Channel</a>";
            } else if(type === 'BOTS') {
                body.innerHTML = "• Raphael Bot (V3)<br>• Anime Searcher<br>• Filter Pro";
            } else if(type === 'TEAM') {
                body.innerHTML = "• Founder: Rimiru<br>• Dev: Raphael AI";
            }
            
            d.style.display = 'block';
        }

        function closeSec() {
            document.getElementById('details').style.display = 'none';
        }
    </script>
</body>
</html>
