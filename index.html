<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tempest Network</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #0d0d0d;
            --cyan-glow: #00ffff;
            --text-main: #ffffff;
            --text-dim: #999999;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; background-color: var(--bg-color);
            color: var(--text-main); display: flex;
            flex-direction: column; align-items: center;
            overflow-x: hidden; padding-bottom: 50px;
        }

        .back-nav {
            position: sticky; top: 0; width: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            padding: 12px 20px; z-index: 3000;
            display: flex; align-items: center;
            border-bottom: 1px solid #222;
            box-sizing: border-box;
        }

        .back-btn-neon {
            background: linear-gradient(45deg, #00ffff, #008080);
            color: #000; border: none;
            padding: 8px 20px; border-radius: 25px;
            font-weight: 900; font-size: 11px;
            box-shadow: 0 0 15px var(--cyan-glow);
            cursor: pointer; text-transform: uppercase;
        }

        .profile-section { margin-top: 30px; text-align: center; }
        .profile-circle {
            width: 120px; height: 120px; border-radius: 50%;
            border: 3px solid var(--cyan-glow); box-shadow: 0 0 25px var(--cyan-glow);
            object-fit: cover; margin-bottom: 15px;
        }
        .main-title { font-size: 24px; font-weight: bold; color: var(--cyan-glow); letter-spacing: 2px; text-shadow: 0 0 10px var(--cyan-glow); text-transform: uppercase; }

        .menu-container { width: 92%; margin-top: 30px; display: flex; flex-direction: column; gap: 15px; }
        .nav-card {
            background: var(--card-bg); border-radius: 18px; padding: 22px;
            border: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center;
        }

        #details, #sub-details {
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: #000;
            z-index: 2500; overflow-y: auto;
        }

        .item-card {
            background: var(--glass); border-radius: 15px; padding: 18px;
            margin: 12px 18px; display: flex; align-items: center; gap: 15px;
            border: 1px solid #222;
        }
        .card-icon { width: 65px; height: 65px; border-radius: 12px; object-fit: cover; border: 1px solid var(--cyan-glow); }
        .card-info { flex: 1; }
        .card-info h4 { margin: 0; font-size: 18px; color: #fff; text-transform: uppercase; }
        .card-info p { margin: 4px 0 10px; font-size: 12px; color: var(--text-dim); }

        .btn-cyan {
            background: var(--cyan-glow); color: #000; border: none;
            padding: 9px 18px; border-radius: 8px; font-weight: bold;
            text-decoration: none; font-size: 12px; display: inline-block;
            text-transform: uppercase; text-align: center; box-shadow: 0 0 10px rgba(0,255,255,0.3);
        }

        h2 { margin: 20px 22px; font-size: 24px; color: var(--cyan-glow); text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="profile-section">
        <img src="https://graph.org/file/9c42657eb544eed3f1bb1-79928d280532a17768.jpg" class="profile-circle">
        <div class="main-title">TEMPEST NETWORK</div>
    </div>

    <div class="menu-container">
        <div class="nav-card">
            <div><h3 style="margin:0;">📡 CHANNELS</h3><p style="color:var(--text-dim); font-size:12px;">Join Hubs</p></div>
            <button class="btn-cyan" onclick="openSec('CHANNELS')">SHOW</button>
        </div>
        <div class="nav-card">
            <div><h3 style="margin:0;">🤖 MY BOTS</h3><p style="color:var(--text-dim); font-size:12px;">Tools & Automation</p></div>
            <button class="btn-cyan" onclick="openSec('BOTS')">SHOW</button>
        </div>
        <div class="nav-card">
            <div><h3 style="margin:0;">👥 OUR TEAM</h3><p style="color:var(--text-dim); font-size:12px;">The Creators</p></div>
            <button class="btn-cyan" onclick="openSec('TEAM')">SHOW</button>
        </div>
    </div>

    <div id="details">
        <div class="back-nav"><button class="back-btn-neon" onclick="closeSec()">← BACK</button></div>
        <h2 id="det-title"></h2>
        <div id="det-body"></div>
    </div>

    <div id="sub-details">
        <div class="back-nav"><button class="back-btn-neon" onclick="closeSubSec()">← BACK</button></div>
        <h2 id="sub-det-title"></h2>
        <div id="sub-det-body"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const pics = {
            main_profile: "https://graph.org/file/9c42657eb544eed3f1bb1-79928d280532a17768.jpg",
            kakashi: "https://graph.org/file/677ab5e12e4c877e50992-30038e6b3fb1004b9c.jpg",
            akira: "https://graph.org/file/e43410b49f6c5fe7d6b3e-6489a13cac960028f8.jpg",
            naruto: "https://graph.org/file/7aad331887bf0412ecf52-d38393965a67743fe4.jpg",
            raphael: "https://graph.org/file/cab9c3ddec6f93446ecf7-94003dc9918819cf3a.jpg",
            ongoing: "https://graph.org/file/9c42657eb544eed3f1bb1-79928d280532a17768.jpg",
            tempest_index: "https://graph.org/file/914b50896003e019285d2-8a980a64e8ef20e02d.jpg",
            tg_icon: "https://graph.org/file/c144ecb7bdfba77066953-b0f18969c0e6f48d8b.jpg",
            ig_icon: "https://graph.org/file/70cb7dac798a886e14b63-49577b3801d340b295.jpg"
        };

        function openSec(type) {
            const d = document.getElementById('details');
            const title = document.getElementById('det-title');
            const body = document.getElementById('det-body');
            title.innerText = type;

            if(type === 'CHANNELS') {
                body.innerHTML = `
                    <div class="item-card">
                        <img src="${pics.ongoing}" class="card-icon">
                        <div class="card-info"><h4>Ongoing Anime</h4><p>Latest Hindi Episodes</p><a href="https://t.me/+mr5SZGOlW0U4YmQ1" class="btn-cyan" target="_blank">JOIN</a></div>
                    </div>
                    <div class="item-card">
                        <img src="${pics.tempest_index}" class="card-icon">
                        <div class="card-info"><h4>Tempest Index</h4><p>Complete Database</p><a href="https://t.me/+WevEPT5r7K1lNjY1" class="btn-cyan" target="_blank">JOIN</a></div>
                    </div>
                `;
            } else if(type === 'TEAM') {
                body.innerHTML = `
                    <div class="item-card">
                        <img src="${pics.kakashi}" class="card-icon">
                        <div class="card-info"><h4>KAKASHI</h4><p>Founder</p><button class="btn-cyan" onclick="openKakashiSocials()">SOCIALS</button></div>
                    </div>
                    <div class="item-card">
                        <img src="${pics.akira}" class="card-icon">
                        <div class="card-info"><h4>AKIRA</h4><p>Lead Developer</p><a href="https://t.me/MightyEmperor" class="btn-cyan" target="_blank">CHAT</a></div>
                    </div>
                    <div class="item-card">
                        <img src="${pics.naruto}" class="card-icon">
                        <div class="card-info"><h4>NARUTO</h4><p>Team Member</p><a href="https://t.me/qtflake" class="btn-cyan" target="_blank">CHAT</a></div>
                    </div>
                `;
            } else if(type === 'BOTS') {
                body.innerHTML = `
                    <div class="item-card">
                        <img src="${pics.raphael}" class="card-icon">
                        <div class="card-info"><h4>Raphael Bot</h4><p>AI Manager</p><a href="https://t.me/tempest_animeresercher_bot" class="btn-cyan" target="_blank">OPEN</a></div>
                    </div>
                `;
            }
            d.style.display = 'block';
        }

        function openKakashiSocials() {
            const sub = document.getElementById('sub-details');
            document.getElementById('sub-det-title').innerText = "KAKASHI LINKS";
            document.getElementById('sub-det-body').innerHTML = `
                <div class="item-card" onclick="openIdList()">
                    <img src="${pics.tg_icon}" style="width:45px; height:45px; border-radius:10px; object-fit:cover;">
                    <div class="card-info"><h4>TELEGRAM</h4><p>Official IDs List</p></div>
                </div>
                <div class="item-card" onclick="window.open('https://instagram.com/half_10053', '_blank')">
                    <img src="${pics.ig_icon}" style="width:45px; height:45px; border-radius:10px; object-fit:cover;">
                    <div class="card-info"><h4>INSTAGRAM</h4><p>Follow Me</p></div>
                </div>
            `;
            sub.style.display = 'block';
        }

        function openIdList() {
            const body = document.getElementById('sub-det-body');
            document.getElementById('sub-det-title').innerText = "TELEGRAM IDS";
            body.innerHTML = `
                <div class="item-card">
                    <div class="card-info"><h4>Main ID</h4><p>@Thesoul_xD</p><a href="https://t.me/Thesoul_xD" class="btn-cyan" target="_blank">MESSAGE</a></div>
                </div>
            `;
        }

        function closeSec() { document.getElementById('details').style.display = 'none'; }
        function closeSubSec() { 
            if(document.getElementById('sub-det-title').innerText === "TELEGRAM IDS") {
                openKakashiSocials();
            } else {
                document.getElementById('sub-details').style.display = 'none'; 
            }
        }
    </script>
</body>
</html>
