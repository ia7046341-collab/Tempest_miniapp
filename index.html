<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tempest Network</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Orbitron:wght@400;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #000000;
            --cyan-glow: #00ffff;
            --text-main: #ffffff;
            --text-dim: #999999;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0; 
            background: radial-gradient(circle at center, #001f1f 0%, #000000 80%);
            color: var(--text-main); 
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden; padding-bottom: 90px;
        }

        /* सुपर चमकदार एनीमेटेड बैकग्राउंड */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(white, rgba(255,255,255,0) 2px), 
                radial-gradient(var(--cyan-glow), rgba(0,255,255,0) 3px),
                radial-gradient(rgba(0,255,255,0.8), rgba(0,255,255,0) 5px);
            background-size: 100px 100px, 70px 70px, 150px 150px;
            opacity: 0.3;
            animation: move-cosmic-aura 18s linear infinite; z-index: -1;
        }
        @keyframes move-cosmic-aura {
            0% { background-position: 0 0, 30px 30px, 70px 110px; }
            100% { background-position: 500px 1000px, 400px 800px, 300px 600px; }
        }

        .main-title { 
            font-family: 'Bangers', cursive; font-size: 34px; 
            color: var(--cyan-glow); text-shadow: 0 0 20px var(--cyan-glow); margin-top: 25px;
            text-transform: uppercase; letter-spacing: 3px;
        }

        h3, h2 { font-family: 'Orbitron', sans-serif; letter-spacing: 1px; text-transform: uppercase; }

        /* --- COLORFUL BOXES STYLE --- */
        .nav-card, .item-card {
            width: 100%; border-radius: 20px; padding: 18px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255,255,255,0.1); margin-bottom: 12px;
            backdrop-filter: blur(10px); box-sizing: border-box;
        }

        .card-blue { background: linear-gradient(135deg, rgba(0,255,255,0.15), #0a0a0a); border-left: 5px solid #00ffff; }
        .card-orange { background: linear-gradient(135deg, rgba(255,140,0,0.15), #0a0a0a); border-left: 5px solid #ff8c00; }
        .card-yellow { background: linear-gradient(135deg, rgba(255,215,0,0.15), #0a0a0a); border-left: 5px solid #ffd700; }
        .card-grey { background: linear-gradient(135deg, rgba(169,169,169,0.15), #0a0a0a); border-left: 5px solid #a9a9a9; }
        .card-purple { background: linear-gradient(135deg, rgba(147,112,219,0.15), #0a0a0a); border-left: 5px solid #9370db; }

        .menu-container { width: 92%; margin-top: 30px; }

        /* --- BOTTOM BACK BUTTON --- */
        .bottom-nav { position: fixed; bottom: 25px; width: 100%; display: flex; justify-content: center; z-index: 4000; pointer-events: none; }
        .back-btn-float {
            pointer-events: auto; font-family: 'Orbitron', sans-serif;
            background: rgba(0, 0, 0, 0.9); color: var(--cyan-glow);
            border: 2px solid var(--cyan-glow); padding: 12px 35px; border-radius: 30px;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.6); font-weight: 900;
            display: none; cursor: pointer; text-transform: uppercase;
        }

        .img-circle { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--cyan-glow); box-shadow: 0 0 25px var(--cyan-glow); object-fit: cover; }
        .list-icon { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--cyan-glow); box-shadow: 0 0 10px rgba(0,255,255,0.4); }

        #details, #sub-details { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 2500; overflow-y: auto; padding-top: 25px; }

        .card-info { flex: 1; margin-left: 15px; }
        .card-info h4 { font-family: 'Orbitron', sans-serif; margin: 0; font-size: 15px; color: #fff; }
        .card-info p { margin: 4px 0 10px; font-size: 11px; color: var(--text-dim); }

        .btn-cyan { font-family: 'Orbitron', sans-serif; background: var(--cyan-glow); color: #000; border: none; padding: 8px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 10px; box-shadow: 0 0 10px rgba(0,255,255,0.4); text-transform: uppercase; text-decoration: none; }
    </style>
</head>
<body>

    <div class="profile-section" style="text-align: center; margin-top: 30px;">
        <img src="network.jpg" class="img-circle">
        <div class="main-title">TEMPEST NETWORK</div>
    </div>

    <div class="menu-container">
        <div class="nav-card card-blue">
            <div><h3>📡 CHANNELS</h3><p style="color:#999; font-size:11px;">Update Hubs</p></div>
            <button class="btn-cyan" onclick="openSec('CHANNELS')">SHOW</button>
        </div>
        <div class="nav-card card-purple">
            <div><h3>🤖 MY BOTS</h3><p style="color:#999; font-size:11px;">Tools & AI</p></div>
            <button class="btn-cyan" onclick="openSec('BOTS')">SHOW</button>
        </div>
        <div class="nav-card card-orange">
            <div><h3>👥 OUR TEAM</h3><p style="color:#999; font-size:11px;">Creators</p></div>
            <button class="btn-cyan" onclick="openSec('TEAM')">SHOW</button>
        </div>
    </div>

    <div class="bottom-nav"><button id="globalBackBtn" class="back-btn-float" onclick="smartBack()">← BACK TO MENU</button></div>

    <div id="details">
        <h2 id="det-title" style="margin-left:22px; color: var(--cyan-glow); font-family:Orbitron;"></h2>
        <div id="det-body"></div>
    </div>

    <div id="sub-details">
        <h2 id="sub-det-title" style="margin-left:22px; color: var(--cyan-glow); font-family:Orbitron;"></h2>
        <div id="sub-det-body"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const pics = {
            kakashi: "kakashi.jpg", akira: "akira.jpg", naruto: "naruto.jpg", raphael: "raphael.jpg",
            ongoing: "ongoing.jpg", tempest_index: "index.jpg", tempest_main: "main.jpg", 
            tg_icon: "tg.jpg", ig_icon: "ig.jpg", goku: "goku.jpg", smokey: "smokey.jpg" 
        };

        const backBtn = document.getElementById('globalBackBtn');

        function openSec(type) {
            const d = document.getElementById('details');
            const body = document.getElementById('det-body');
            document.getElementById('det-title').innerText = type;
            backBtn.style.display = 'block';

            if(type === 'CHANNELS') {
                body.innerHTML = `
                    <div class="item-card card-blue"><img src="${pics.ongoing}" class="list-icon"><div class="card-info"><h4>Ongoing Anime</h4><a href="https://t.me/+mr5SZGOlW0U4YmQ1" class="btn-cyan">JOIN</a></div></div>
                    <div class="item-card card-blue"><img src="${pics.tempest_index}" class="list-icon"><div class="card-info"><h4>Tempest Index</h4><a href="https://t.me/+WevEPT5r7K1lNjY1" class="btn-cyan">JOIN</a></div></div>
                    <div class="item-card card-blue"><img src="${pics.tempest_main}" class="list-icon"><div class="card-info"><h4>Tempest Main</h4><a href="https://t.me/tempest_main" class="btn-cyan">JOIN</a></div></div>
                `;
            } else if(type === 'TEAM') {
                body.innerHTML = `
                    <div class="item-card card-grey"><img src="${pics.kakashi}" class="list-icon"><div class="card-info"><h4>KAKASHI</h4><button class="btn-cyan" onclick="openMemberSocials('KAKASHI')">SOCIALS</button></div></div>
                    <div class="item-card card-blue"><img src="${pics.akira}" class="list-icon"><div class="card-info"><h4>AKIRA</h4><button class="btn-cyan" onclick="openMemberSocials('AKIRA')">SOCIALS</button></div></div>
                    <div class="item-card card-orange"><img src="${pics.goku}" class="list-icon"><div class="card-info"><h4>GOKU</h4><button class="btn-cyan" onclick="openMemberSocials('GOKU')">SOCIALS</button></div></div>
                    <div class="item-card card-yellow"><img src="${pics.naruto}" class="list-icon"><div class="card-info"><h4>NARUTO</h4><button class="btn-cyan" onclick="openMemberSocials('NARUTO')">SOCIALS</button></div></div>
                    <div class="item-card card-purple"><img src="${pics.smokey}" class="list-icon"><div class="card-info"><h4>SMOKEY</h4><button class="btn-cyan" onclick="openMemberSocials('SMOKEY')">SOCIALS</button></div></div>
                `;
            } else if(type === 'BOTS') {
                body.innerHTML = `
                    <div class="item-card card-purple"><img src="${pics.raphael}" class="list-icon"><div class="card-info"><h4>Raphael Bot</h4><a href="https://t.me/tempest_animeresercher_bot" class="btn-cyan">OPEN</a></div></div>
                `;
            }
            d.style.display = 'block';
        }

        function openMemberSocials(name) {
            const sub = document.getElementById('sub-details');
            const body = document.getElementById('sub-det-body');
            document.getElementById('sub-det-title').innerText = name + " SOCIALS";
            let color = name === 'GOKU' ? 'card-orange' : (name === 'NARUTO' ? 'card-yellow' : (name === 'KAKASHI' ? 'card-grey' : 'card-blue'));
            
            let html = `<div class="item-card ${color}"><img src="${pics.tg_icon}" class="list-icon"><div class="card-info"><h4>Telegram</h4><button class="btn-cyan" onclick="openSpecificId('${name}_TG')">VIEW ID</button></div></div>`;
            
            if(name === 'KAKASHI') {
                html += `<div class="item-card card-purple"><img src="${pics.ig_icon}" class="list-icon"><div class="card-info"><h4>Instagram</h4><button class="btn-cyan" onclick="openSpecificId('KAKASHI_IG')">VIEW ID</button></div></div>`;
            }
            
            body.innerHTML = html;
            sub.style.display = 'block';
        }

        function openSpecificId(type) {
            const body = document.getElementById('sub-det-body');
            document.getElementById('sub-det-title').innerText = "ID DETAILS";
            
            if(type === 'KAKASHI_TG') body.innerHTML = `<div class="item-card card-grey"><img src="${pics.kakashi}" class="list-icon"><div class="card-info"><h4>Kakashi Main</h4><p>@Thesoul_xD</p><a href="https://t.me/Thesoul_xD" class="btn-cyan">MSG</a></div></div>`;
            else if(type === 'KAKASHI_IG') body.innerHTML = `<div class="item-card card-purple"><img src="${pics.ig_icon}" class="list-icon"><div class="card-info"><h4>Instagram</h4><p>@half_10053</p><a href="https://instagram.com/half_10053" class="btn-cyan">OPEN</a></div></div>`;
            else if(type === 'AKIRA_TG') body.innerHTML = `<div class="item-card card-blue"><img src="${pics.akira}" class="list-icon"><div class="card-info"><h4>Akira ID</h4><p>@MightyEmperor</p><a href="https://t.me/MightyEmperor" class="btn-cyan">MSG</a></div></div>`;
            else if(type === 'GOKU_TG') body.innerHTML = `<div class="item-card card-orange"><img src="${pics.goku}" class="list-icon"><div class="card-info"><h4>Goku ID</h4><p>@goku_shinobi</p><a href="https://t.me/goku_shinobi" class="btn-cyan">MSG</a></div></div>`;
            else if(type === 'NARUTO_TG') body.innerHTML = `<div class="item-card card-yellow"><img src="${pics.naruto}" class="list-icon"><div class="card-info"><h4>Naruto ID</h4><p>@qtflake</p><a href="https://t.me/qtflake" class="btn-cyan">MSG</a></div></div>`;
            else if(type === 'SMOKEY_TG') body.innerHTML = `<div class="item-card card-purple"><img src="${pics.smokey}" class="list-icon"><div class="card-info"><h4>Smokey ID</h4><p>@con_dom</p><a href="https://t.me/con_dom" class="btn-cyan">MSG</a></div></div>`;
        }

        function smartBack() {
            const sub = document.getElementById('sub-details');
            const det = document.getElementById('details');
            if(sub.style.display === 'block') {
                if(document.getElementById('sub-det-title').innerText === "ID DETAILS") {
                    // Title check is tricky, so just hiding sub for now
                    sub.style.display = 'none'; 
                } else {
                    sub.style.display = 'none';
                }
            } else {
                det.style.display = 'none';
                backBtn.style.display = 'none';
            }
        }
    </script>
</body>
</html>
