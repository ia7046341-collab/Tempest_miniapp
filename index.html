<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tempest Network</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #0d0d0d;
            --cyan-glow: #00ffff;
            --text-main: #ffffff;
            --text-dim: #999999;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding-bottom: 50px;
        }

        /* Profile Section */
        .profile-section {
            margin-top: 40px;
            text-align: center;
        }

        .profile-circle {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 3px solid var(--cyan-glow);
            box-shadow: 0 0 20px var(--cyan-glow);
            object-fit: cover;
            margin-bottom: 15px;
        }

        .user-name {
            font-size: 24px;
            font-weight: bold;
            color: var(--cyan-glow);
            text-shadow: 0 0 10px var(--cyan-glow);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Menu Container */
        .menu-container {
            width: 92%;
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Main Menu Cards */
        .nav-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #1a1a1a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Details Overlay */
        #details {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--bg-color);
            z-index: 1000;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .back-link {
            color: var(--cyan-glow);
            font-weight: bold;
            cursor: pointer;
            display: inline-block;
            margin-bottom: 25px;
            text-transform: uppercase;
            font-size: 14px;
        }

        /* Sub-Cards */
        .sub-card {
            background: #111;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 15px;
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sub-card h4 {
            margin: 0;
            color: var(--text-main);
            font-size: 17px;
            text-transform: uppercase;
        }

        .sub-card p {
            margin: 0;
            font-size: 13px;
            color: var(--text-dim);
        }

        /* Cyan Buttons */
        .action-btn, .join-btn {
            background-color: var(--cyan-glow);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            text-transform: uppercase;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }
    </style>
</head>
<body>

    <div class="profile-section">
        <img src="https://graph.org/file/9c42657eb544eed3f1bb1-79928d280532a17768.jpg" alt="Profile" class="profile-circle">
        <div class="user-name">TEMPEST NETWORK</div>
    </div>

    <div class="menu-container">
        <div class="nav-card">
            <div style="flex:1">
                <h3 style="margin:0; font-size:18px;">📡 CHANNELS</h3>
                <p style="color:var(--text-dim); font-size:12px; margin-top:5px;">Join our update hubs</p>
            </div>
            <button class="action-btn" onclick="openSec('CHANNELS')">SHOW</button>
        </div>

        <div class="nav-card">
            <div style="flex:1">
                <h3 style="margin:0; font-size:18px;">🤖 MY BOTS</h3>
                <p style="color:var(--text-dim); font-size:12px; margin-top:5px;">Automation & Tools</p>
            </div>
            <button class="action-btn" onclick="openSec('BOTS')">SHOW</button>
        </div>

        <div class="nav-card">
            <div style="flex:1">
                <h3 style="margin:0; font-size:18px;">👥 OUR TEAM</h3>
                <p style="color:var(--text-dim); font-size:12px; margin-top:5px;">Meet the creators</p>
            </div>
            <button class="action-btn" onclick="openSec('TEAM')">SHOW</button>
        </div>
    </div>

    <div id="details">
        <span class="back-link" onclick="closeSec()">← BACK TO HOME</span>
        <h2 id="det-title" style="color: var(--cyan-glow); margin-bottom:20px; text-transform: uppercase;"></h2>
        <div id="det-body"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function openSec(type) {
            const d = document.getElementById('details');
            const title = document.getElementById('det-title');
            const body = document.getElementById('det-body');
            
            title.innerText = type;

            if(type === 'CHANNELS') {
                body.innerHTML = `
                    <div class="sub-card">
                        <h4>Anime Ongoing</h4>
                        <p>Latest ongoing episodes in Hindi/English.</p>
                        <a href="https://t.me/+mr5SZGOlW0U4YmQ1" class="join-btn" target="_blank">JOIN CHANNEL</a>
                    </div>
                    <div class="sub-card">
                        <h4>Tempest Index</h4>
                        <p>Our complete anime database index.</p>
                        <a href="https://t.me/+WevEPT5r7K1lNjY1" class="join-btn" target="_blank">JOIN CHANNEL</a>
                    </div>
                    <div class="sub-card">
                        <h4>Tempest Main</h4>
                        <p>Primary updates and community news.</p>
                        <a href="https://t.me/tempest_main" class="join-btn" target="_blank">JOIN CHANNEL</a>
                    </div>
                `;
            } else if(type === 'BOTS') {
                body.innerHTML = `
                    <div class="sub-card">
                        <h4>Raphael Bot</h4>
                        <p>Ultimate AI assistant for managing files.</p>
                        <a href="https://t.me/tempest_animeresercher_bot" class="join-btn" target="_blank">OPEN BOT</a>
                    </div>
                `;
            } else if(type === 'TEAM') {
                body.innerHTML = `
                    <div class="sub-card">
                        <h4>FOUNDER - KAKASHI</h4>
                        <p>The vision behind Tempest Network.</p>
                        <a href="https://t.me/Thesoul_xD" class="join-btn" target="_blank">CONTACT</a>
                    </div>
                    <div class="sub-card">
                        <h4>DEV - AKIRA</h4>
                        <p>Leading the technical development.</p>
                        <a href="https://t.me/MightyEmperor" class="join-btn" target="_blank">CONTACT</a>
                    </div>
                    <div class="sub-card">
                        <h4>CO-DEV - RAPHAEL AI</h4>
                        <p>AI-powered assistant for smooth operations.</p>
                        <a href="https://t.me/tempest_animeresercher_bot" class="join-btn" target="_blank">OPEN BOT</a>
                    </div>
                `;
            }
            d.style.display = 'block';
        }

        function closeSec() {
            document.getElementById('details').style.display = 'none';
        }
    </script>
</body>
</html>
