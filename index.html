<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tempest Network</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #0d0d0d;
            --cyan-glow: #00ffff;
            --text-main: #ffffff;
            --text-dim: #999999;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; background-color: var(--bg-color); color: var(--text-main);
            display: flex; flex-direction: column; align-items: center; padding-bottom: 50px;
        }

        /* Profile Section */
        .profile-section { margin-top: 40px; text-align: center; }
        .profile-circle {
            width: 120px; height: 120px; border-radius: 50%;
            border: 3px solid var(--cyan-glow); box-shadow: 0 0 20px var(--cyan-glow);
            object-fit: cover; margin-bottom: 15px;
        }
        .user-name { font-size: 24px; font-weight: bold; color: var(--cyan-glow); text-shadow: 0 0 10px var(--cyan-glow); text-transform: uppercase; }

        /* Menu */
        .menu-container { width: 92%; margin-top: 30px; display: flex; flex-direction: column; gap: 15px; }
        .nav-card {
            background: var(--card-bg); border-radius: 15px; padding: 20px;
            border: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center;
        }

        /* Overlay */
        #details {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 1000; padding: 20px; box-sizing: border-box; overflow-y: auto;
        }
        .back-link { color: var(--cyan-glow); font-weight: bold; cursor: pointer; display: inline-block; margin-bottom: 25px; }

        /* Sub-Cards with Images (Main logic here) */
        .sub-card {
            background: #111; border-radius: 12px; padding: 15px; margin-bottom: 15px;
            border: 1px solid #222; display: flex; align-items: center; gap: 15px;
        }
        .card-img {
            width: 60px; height: 60px; border-radius: 10px; object-fit: cover;
            border: 1px solid var(--cyan-glow);
        }
        .card-content { flex: 1; }
        .card-content h4 { margin: 0; color: var(--text-main); font-size: 16px; text-transform: uppercase; }
        .card-content p { margin: 3px 0 8px; font-size: 12px; color: var(--text-dim); }

        .join-btn {
            background-color: var(--cyan-glow); color: #000; border: none;
            padding: 8px 15px; border-radius: 6px; font-weight: bold; font-size: 11px;
            text-transform: uppercase; text-decoration: none; display: inline-block;
        }
        .action-btn { background-color: var(--cyan-glow); color: #000; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="profile-section">
        <img src="https://graph.org/file/9c42657eb544eed3f1bb1-79928d280532a17768.jpg" alt="Profile" class="profile-circle">
        <div class="user-name">TEMPEST NETWORK</div>
    </div>

    <div class="menu-container">
        <div class="nav-card">
            <div style="flex:1"><h3>📡 CHANNELS</h3><p style="color:var(--text-dim); font-size:12px;">Join our update hubs</p></div>
            <button class="action-btn" onclick="openSec('CHANNELS')">SHOW</button>
        </div>
        <div class="nav-card">
            <div style="flex:1"><h3>🤖 MY BOTS</h3><p style="color:var(--text-dim); font-size:12px;">Automation & Tools</p></div>
            <button class="action-btn" onclick="openSec('BOTS')">SHOW</button>
        </div>
        <div class="nav-card">
            <div style="flex:1"><h3>👥 OUR TEAM</h3><p style="color:var(--text-dim); font-size:12px;">Meet the creators</p></div>
            <button class="action-btn" onclick="openSec('TEAM')">SHOW</button>
        </div>
    </div>

    <div id="details">
        <span class="back-link" onclick="closeSec()">← BACK TO HOME</span>
        <h2 id="det-title" style="color: var(--cyan-glow); margin-bottom:20px; text-transform: uppercase;"></h2>
        <div id="det-body"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function openSec(type) {
            const d = document.getElementById('details');
            const title = document.getElementById('det-title');
            const body = document.getElementById('det-body');
            title.innerText = type;

            if(type === 'CHANNELS') {
                body.innerHTML = `
                    <div class="sub-card">
                        <img src="https://graph.org/file/9c42657eb544eed3f1bb1-79928d280532a17768.jpg" class="card-img">
                        <div class="card-content">
                            <h4>Anime Ongoing</h4>
                            <p>Latest ongoing episodes in Hindi.</p>
                            <a href="https://t.me/+mr5SZGOlW0U4YmQ1" class="join-btn" target="_blank">JOIN</a>
                        </div>
                    </div>
                    <div class="sub-card">
                        <img src="https://graph.org/file/9c42657eb544eed3f1bb1-79928d280532a17768.jpg" class="card-img">
                        <div class="card-content">
                            <h4>Tempest Index</h4>
                            <p>Complete anime database index.</p>
                            <a href="https://t.me/+WevEPT5r7K1lNjY1" class="join-btn" target="_blank">JOIN</a>
                        </div>
                    </div>
                `;
            } else if(type === 'TEAM') {
                body.innerHTML = `
                    <div class="sub-card">
                        <img src="https://graph.org/file/9c42657eb544eed3f1bb1-79928d280532a17768.jpg" class="card-img">
                        <div class="card-content">
                            <h4>KAKASHI</h4>
                            <p>Founder & Visionary</p>
                            <a href="https://t.me/Thesoul_xD" class="join-btn" target="_blank">CHAT</a>
                        </div>
                    </div>
                    <div class="sub-card">
                        <img src="https://graph.org/file/9c42657eb544eed3f1bb1-79928d280532a17768.jpg" class="card-img">
                        <div class="card-content">
                            <h4>AKIRA</h4>
                            <p>Lead Developer</p>
                            <a href="https://t.me/MightyEmperor" class="join-btn" target="_blank">CHAT</a>
                        </div>
                    </div>
                `;
            }
            d.style.display = 'block';
        }
        function closeSec() { document.getElementById('details').style.display = 'none'; }
    </script>
</body>
</html>
