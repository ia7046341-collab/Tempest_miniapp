<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tempest Network</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Orbitron:wght@400;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #0d0d0d;
            --cyan-glow: #00ffff;
            --text-main: #ffffff;
            --text-dim: #999999;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0; 
            /* गहरा नीला और काला मिक्स बैकग्राउंड */
            background: radial-gradient(circle at center, #001f1f 0%, #000000 80%);
            color: var(--text-main); 
            display: flex;
            flex-direction: column; 
            align-items: center;
            overflow-x: hidden; 
            padding-bottom: 90px;
            position: relative;
        }

        /* --- सुपर चमकदार कॉस्मिक ओरा --- */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: 
                radial-gradient(white, rgba(255,255,255,0) 2px), 
                radial-gradient(var(--cyan-glow), rgba(0,255,255,0) 3px),
                radial-gradient(rgba(0,255,255,0.8), rgba(0,255,255,0) 5px);
            
            background-size: 100px 100px, 70px 70px, 150px 150px;
            background-position: 0 0, 30px 30px, 70px 110px;
            
            opacity: 0.25;
            animation: move-cosmic-aura 18s linear infinite;
            z-index: -1;
        }

        @keyframes move-cosmic-aura {
            0% { background-position: 0 0, 30px 30px, 70px 110px; }
            50% { opacity: 0.4; } 
            100% { background-position: 500px 1000px, 400px 800px, 300px 600px; }
        }

        .main-title { 
            font-family: 'Bangers', cursive;
            font-size: 34px; 
            color: var(--cyan-glow); 
            letter-spacing: 3px; 
            text-shadow: 0 0 20px var(--cyan-glow);
            margin-top: 25px;
            text-transform: uppercase;
        }

        h3, h2 {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* --- BOTTOM BACK BUTTON --- */
        .bottom-nav {
            position: fixed; bottom: 25px; width: 100%;
            display: flex; justify-content: center; z-index: 4000;
            pointer-events: none;
        }

        .back-btn-float {
            pointer-events: auto;
            font-family: 'Orbitron', sans-serif;
            background: rgba(0, 0, 0, 0.85);
            color: var(--cyan-glow);
            border: 2px solid var(--cyan-glow);
            padding: 12px 35px; border-radius: 30px;
            font-weight: 900; font-size: 13px;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.6);
            cursor: pointer; text-transform: uppercase;
            backdrop-filter: blur(10px);
            display: none; 
        }

        .profile-section { margin-top: 30px; text-align: center; }
        .img-circle {
            width: 120px; height: 120px; border-radius: 50%;
            border: 3px solid var(--cyan-glow); box-shadow: 0 0 30px var(--cyan-glow);
            object-fit: cover;
        }

        .menu-container { width: 92%; margin-top: 35px; display: flex; flex-direction: column; gap: 15px; }
        .nav-card {
            background: var(--card-bg); border-radius: 20px; padding: 22px;
            border: 1px solid #222; display: flex; justify-content: space-between; align-items: center;
            box-shadow: inset 0 0 10px rgba(0, 255, 255, 0.05);
        }

        #details, #sub-details {
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.95);
            z-index: 2500; overflow-y: auto; padding-top: 25px;
        }

        .item-card {
            background: var(--glass); border-radius: 18px; padding: 18px;
            margin: 12px 18px; display: flex; align-items: center; gap: 15px;
            border: 1px solid #333;
            backdrop-filter: blur(8px);
        }
        
        .list-icon { 
            width: 65px; height: 65px; border-radius: 50%; 
            object-fit: cover; border: 2px solid var(--cyan-glow); 
            box-shadow: 0 0 15px rgba(0,255,255,0.4);
        }
        
        .card-info { flex: 1; }
        .card-info h4 { font-family: 'Orbitron', sans-serif; margin: 0; font-size: 16px; color: #fff; text-transform: uppercase; }
        .card-info p { margin: 4px 0 10px; font-size: 11px; color: var(--text-dim); }

        .btn-cyan {
            font-family: 'Orbitron', sans-serif;
            background: var(--cyan-glow); color: #000; border: none;
            padding: 9px 18px; border-radius: 10px; font-weight: bold;
            font-size: 10px; text-decoration: none; display: inline-block;
            box-shadow: 0 0 15px rgba(0,255,255,0.4); text-transform: uppercase;
        }

    </style>
</head>
<body>

    <div class="profile-section">
        <img src="network.jpg" class="img-circle">
        <div class="main-title">TEMPEST NETWORK</div>
    </div>

    <div class="menu-container">
        <div class="nav-card">
            <div><h3>📡 CHANNELS</h3><p style="color:var(--text-dim); font-size:12px;">Join Anime Hubs</p></div>
            <button class="btn-cyan" onclick="openSec('CHANNELS')">SHOW</button>
        </div>
        <div class="nav-card">
            <div><h3>🤖 MY BOTS</h3><p style="color:var(--text-dim); font-size:12px;">Tools & AI Manager</p></div>
            <button class="btn-cyan" onclick="openSec('BOTS')">SHOW</button>
        </div>
        <div class="nav-card">
            <div><h3>👥 OUR TEAM</h3><p style="color:var(--text-dim); font-size:12px;">The Creators</p></div>
            <button class="btn-cyan" onclick="openSec('TEAM')">SHOW</button>
        </div>
    </div>

    <div class="bottom-nav">
        <button id="globalBackBtn" class="back-btn-float" onclick="smartBack()">← BACK TO MENU</button>
    </div>

    <div id="details">
        <h2 id="det-title" style="margin-left:22px; color: var(--cyan-glow);"></h2>
        <div id="det-body"></div>
    </div>

    <div id="sub-details">
        <h2 id="sub-det-title" style="margin-left:22px; color: var(--cyan-glow);"></h2>
        <div id="sub-det-body"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const pics = {
            kakashi: "kakashi.jpg",
            akira: "akira.jpg",
            naruto: "naruto.jpg",
            raphael: "raphael.jpg",
            ongoing: "ongoing.jpg",
            tempest_index: "index.jpg",
            tempest_main: "main.jpg", 
            tg_icon: "tg.jpg",
            ig_icon: "ig.jpg",
            goku: "goku.jpg",
            smokey: "smokey.jpg" 
        };

        const backBtn = document.getElementById('globalBackBtn');

        function openSec(type) {
            const d = document.getElementById('details');
            const body = document.getElementById('det-body');
            document.getElementById('det-title').innerText = type;
            backBtn.style.display = 'block';

            if(type === 'CHANNELS') {
                body.innerHTML = `
                    <div class="item-card"><img src="${pics.ongoing}" class="list-icon"><div class="card-info"><h4>Ongoing Anime</h4><p>Latest Hindi Episodes</p><a href="https://t.me/+mr5SZGOlW0U4YmQ1" class="btn-cyan" target="_blank">JOIN</a></div></div>
                    <div class="item-card"><img src="${pics.tempest_index}" class="list-icon"><div class="card-info"><h4>Tempest Index</h4><p>Complete Database</p><a href="https://t.me/+WevEPT5r7K1lNjY1" class="btn-cyan" target="_blank">JOIN</a></div></div>
                    <div class="item-card"><img src="${pics.tempest_main}" class="list-icon"><div class="card-info"><h4>Tempest Main</h4><p>Network & Updates</p><a href="https://t.me/tempest_main" class="btn-cyan" target="_blank">JOIN</a></div></div>
                `;
            } else if(type === 'TEAM') {
                body.innerHTML = `
                    <div class="item-card"><img src="${pics.kakashi}" class="list-icon"><div class="card-info"><h4>KAKASHI</h4><p>Founder</p><button class="btn-cyan" onclick="openKakashiSocials()">SOCIALS</button></div></div>
                    <div class="item-card"><img src="${pics.akira}" class="list-icon"><div class="card-info"><h4>AKIRA</h4><p>Lead Developer</p><a href="https://t.me/MightyEmperor" class="btn-cyan" target="_blank">CHAT</a></div></div>
                    <div class="item-card"><img src="${pics.goku}" class="list-icon"><div class="card-info"><h4>GOKU</h4><p>Co-Founder</p><a href="https://t.me/goku_shinobi" class="btn-cyan" target="_blank">CHAT</a></div></div>
                    <div class="item-card"><img src="${pics.naruto}" class="list-icon"><div class="card-info"><h4>NARUTO</h4><p>Network Owner</p><a href="https://t.me/qtflake" class="btn-cyan" target="_blank">CHAT</a></div></div>
                    <div class="item-card"><img src="${pics.smokey}" class="list-icon"><div class="card-info"><h4>SMOKEY</h4><p>Manager</p><a href="https://t.me/con_dom" class="btn-cyan" target="_blank">CHAT</a></div></div>
                `;
            } else if(type === 'BOTS') {
                body.innerHTML = `
                    <div class="item-card"><img src="${pics.raphael}" class="list-icon"><div class="card-info"><h4>Raphael Bot</h4><p>AI Manager</p><a href="https://t.me/tempest_animeresercher_bot" class="btn-cyan" target="_blank">OPEN</a></div></div>
                `;
            }
            d.style.display = 'block';
        }

        function openKakashiSocials() {
            const sub = document.getElementById('sub-details');
            document.getElementById('sub-det-title').innerText = "SOCIALS";
            document.getElementById('sub-det-body').innerHTML = `
                <div class="item-card">
                    <img src="${pics.tg_icon}" class="list-icon">
                    <div class="card-info">
                        <h4>TELEGRAM</h4>
                        <p>Official IDs List</p>
                        <button class="btn-cyan" onclick="openIdList()">VIEW IDS</button>
                    </div>
                </div>
                <div class="item-card">
                    <img src="${pics.ig_icon}" class="list-icon">
                    <div class="card-info">
                        <h4>INSTAGRAM</h4>
                        <p>@half_10053</p>
                        <a href="https://instagram.com/half_10053" class="btn-cyan" target="_blank">FOLLOW</a>
                    </div>
                </div>
            `;
            sub.style.display = 'block';
        }

        function openIdList() {
            document.getElementById('sub-det-title').innerText = "IDS";
            document.getElementById('sub-det-body').innerHTML = `
                <div class="item-card">
                    <img src="${pics.kakashi}" class="list-icon">
                    <div class="card-info">
                        <h4>Main ID</h4>
                        <p>@Thesoul_xD</p>
                        <a href="https://t.me/Thesoul_xD" class="btn-cyan" target="_blank">MESSAGE</a>
                    </div>
                </div>
            `;
        }

        function smartBack() {
            const sub = document.getElementById('sub-details');
            const det = document.getElementById('details');
            if (sub.style.display === 'block') {
                if (document.getElementById('sub-det-title').innerText === "IDS") {
                    openKakashiSocials();
                } else {
                    sub.style.display = 'none';
                }
            } else {
                det.style.display = 'none';
                backBtn.style.display = 'none';
            }
        }
    </script>
</body>
</html>
